name: Build Phoenix Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install makeself
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself

      - name: Prepare executable permissions
        run: |
          chmod +x build.sh
          chmod +x installation/setup.sh installation/phoenix.sh
          chmod +x installation/scripts/*.sh
          chmod +x installation/utils/7za installation/utils/fio installation/utils/memtester
          chmod +x installation/utils/7z_x86/7zzs installation/utils/7z_arm/7zzs
          chmod +x installation/utils/fio_x86/fio installation/utils/fio_arm/fio
          chmod +x installation/utils/memtester_x86/memtester installation/utils/memtester_arm/memtester

      - name: Build package
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          ./build.sh

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-package-${{ github.run_number }}
          path: |
            phoenix.*.bin
            phoenix.*.bin.md5
          if-no-files-found: error

      - name: Create release for tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            phoenix.*.bin
            phoenix.*.bin.md5
